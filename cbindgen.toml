language = "C"
header = "/* Auto-generated by cbindgen. DO NOT EDIT manually. Regenerated on build. */"
include_guard = "UVIE_H"
pragma_once = false
cpp_compat = true
tab_width = 4
style = "type"
sys_includes = ["stddef.h", "stdint.h"]
no_includes = true
usize_is_size_t = true

[parse]
parse_deps = false

[fn]
sort_by = "None"

[enum]
prefix_with_name = true

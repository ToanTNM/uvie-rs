name: Build & Release macOS

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release'
        type: boolean
        default: true

jobs:
  build:
    name: Build UVieKey
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Install Rust toolchain ─────────────────────────────────────────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      # ── 3. Build Rust static library (universal binary) ───────────────────
      - name: Build Rust lib (arm64)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build Rust lib (x86_64)
        run: cargo build --release --target x86_64-apple-darwin

      - name: Lipo Rust lib → universal
        run: |
          mkdir -p target/release
          lipo -create \
            target/aarch64-apple-darwin/release/libuvie.a \
            target/x86_64-apple-darwin/release/libuvie.a \
            -output target/release/libuvie.a

      # ── 4. Import Apple Developer certificate ────────────────────────────
      - name: Import signing certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD:   ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD:       ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Decode certificate
          echo "$CERTIFICATE_P12_BASE64" | base64 --decode > /tmp/certificate.p12

          # Create temp keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain  -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import cert
          security import /tmp/certificate.p12 \
            -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/productbuild

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain

          rm /tmp/certificate.p12

      # ── 5. Generate version info ──────────────────────────────────────────
      - name: Generate Version.swift
        working-directory: UVieKey
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print CFBundleShortVersionString" Info.plist)
          COMMIT=$(git rev-parse --short HEAD)
          mkdir -p Sources/UVieKey/Generated
          cat > Sources/UVieKey/Generated/Version.swift <<EOF
          // Auto-generated by release workflow. Do not edit manually.
          enum AppVersion {
              static let version = "$VERSION"
              static let commitHash = "$COMMIT"
              static let fullVersion = "v\(version)-\(commitHash)"
          }
          EOF

      # ── 6. Build Swift app ────────────────────────────────────────────────
      - name: Build UVieKey (arm64)
        working-directory: UVieKey
        run: |
          swift build --configuration release \
            --arch arm64 \
            -Xswiftc -I"$GITHUB_WORKSPACE/include" \
            -Xswiftc -L"$GITHUB_WORKSPACE/target/release" \
            -Xlinker -luvie

      - name: Build UVieKey (x86_64)
        working-directory: UVieKey
        run: |
          swift build --configuration release \
            --arch x86_64 \
            -Xswiftc -I"$GITHUB_WORKSPACE/include" \
            -Xswiftc -L"$GITHUB_WORKSPACE/target/release" \
            -Xlinker -luvie

      - name: Lipo Swift binary → universal
        working-directory: UVieKey
        run: |
          lipo -create \
            .build/arm64-apple-macosx/release/UVieKey \
            .build/x86_64-apple-macosx/release/UVieKey \
            -output .build/release/UVieKey

      # ── 7. Bundle .app ────────────────────────────────────────────────────
      - name: Create .app bundle
        run: |
          APP="UVieKey.app"
          CONTENTS="$APP/Contents"
          mkdir -p "$CONTENTS/MacOS"
          mkdir -p "$CONTENTS/Resources"

          cp UVieKey/Info.plist "$CONTENTS/Info.plist"
          cp UVieKey/.build/release/UVieKey "$CONTENTS/MacOS/UVieKey"
          chmod +x "$CONTENTS/MacOS/UVieKey"

          # Copy app icon
          if [ -f "UVieKey/AppIcon.icns" ]; then
            cp UVieKey/AppIcon.icns "$CONTENTS/Resources/AppIcon.icns"
          fi

          # Copy entitlements for reference
          cp UVieKey/UVieKey.entitlements "$CONTENTS/Resources/"

      # ── 8. Code sign ──────────────────────────────────────────────────────
      - name: Sign .app
        env:
          SIGNING_IDENTITY: ${{ secrets.SIGNING_IDENTITY }}
        run: |
          codesign --force --deep --verbose \
            --sign "$SIGNING_IDENTITY" \
            --entitlements UVieKey/UVieKey.entitlements \
            --options runtime \
            UVieKey.app

          # Verify
          codesign --verify --deep --strict --verbose=2 UVieKey.app

      # ── 9. Notarize ───────────────────────────────────────────────────────
      - name: Notarize
        env:
          APPLE_ID:           ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID:      ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          # Zip for notarization
          ditto -c -k --keepParent UVieKey.app UVieKey_notarize.zip

          xcrun notarytool submit UVieKey_notarize.zip \
            --apple-id       "$APPLE_ID" \
            --team-id        "$APPLE_TEAM_ID" \
            --password       "$APPLE_APP_PASSWORD" \
            --wait

          xcrun stapler staple UVieKey.app
          rm UVieKey_notarize.zip

      # ── 10. Package DMG ────────────────────────────────────────────────────
      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME:-dev}"
          DMG_NAME="UVieKey-${VERSION}-universal.dmg"

          # Create staging directory for DMG contents
          STAGING="dmg_staging"
          mkdir -p "$STAGING"

          # Copy app bundle
          cp -R UVieKey.app "$STAGING/"

          # Create symbolic link to Applications
          ln -s /Applications "$STAGING/Applications"

          # Create dmg using hdiutil
          hdiutil create \
            -volname "UVieKey ${VERSION}" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "$DMG_NAME"

          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"

      # ── 11. Draft Release ─────────────────────────────────────────────────
      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || true }}
          generate_release_notes: true
          files: ${{ env.DMG_NAME }}
          body: |
            ## UVieKey ${{ github.ref_name }}

            ### Installation
            1. Download `UVieKey-*-universal.dmg`
            2. Open DMG → drag UVieKey.app to Applications
            3. Launch → grant Accessibility permission in System Settings
            4. UVieKey icon will appear in menu bar

            ### Requirements
            - macOS 13 Ventura or later
            - Apple Silicon or Intel Mac (Universal binary)

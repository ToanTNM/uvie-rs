name: Release uvie binaries

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing git tag to build and release, for example v2.0.9'
        required: true
        type: string
      draft:
        description: 'Create as draft release'
        type: boolean
        default: true

jobs:
  build-macos:
    name: Build macOS universal
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Ensure macOS targets are installed
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build Rust package (arm64)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build Rust package (x86_64)
        run: cargo build --release --target x86_64-apple-darwin

      - name: Lipo Rust outputs to universal
        run: |
          mkdir -p dist/uvie
          lipo -create \
            target/aarch64-apple-darwin/release/libuvie.a \
            target/x86_64-apple-darwin/release/libuvie.a \
            -output dist/uvie/libuvie.a
          lipo -create \
            target/aarch64-apple-darwin/release/uvie \
            target/x86_64-apple-darwin/release/uvie \
            -output dist/uvie/uvie
          chmod +x dist/uvie/uvie

      - name: Copy C header
        run: cp include/uvie.h dist/uvie/uvie.h

      - name: Create tarball
        run: |
          cd dist
          tar czf uvie-macos-universal.tar.gz uvie

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: uvie-macos-universal
          path: dist/uvie-macos-universal.tar.gz

  build-linux:
    name: Build Linux x86_64
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Ensure Linux target is installed
        run: rustup target add x86_64-unknown-linux-gnu

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build Rust package
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Copy release outputs
        run: |
          mkdir -p dist/uvie
          cp target/x86_64-unknown-linux-gnu/release/uvie dist/uvie/uvie
          cp target/x86_64-unknown-linux-gnu/release/libuvie.a dist/uvie/libuvie.a
          cp include/uvie.h dist/uvie/uvie.h

      - name: Create tarball
        run: |
          cd dist
          tar czf uvie-linux-x86_64.tar.gz uvie

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: uvie-linux-x86_64
          path: dist/uvie-linux-x86_64.tar.gz

  build-windows:
    name: Build Windows x86_64
    runs-on: windows-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Ensure Windows target is installed
        run: rustup target add x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Build Rust package
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Copy release outputs
        run: |
          mkdir -p dist/uvie
          cp target/x86_64-pc-windows-msvc/release/uvie.exe dist/uvie/uvie.exe
          cp target/x86_64-pc-windows-msvc/release/uvie.lib dist/uvie/uvie.lib
          cp include/uvie.h dist/uvie/uvie.h

      - name: Create archive
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path uvie\* -DestinationPath uvie-windows-x86_64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: uvie-windows-x86_64
          path: dist/uvie-windows-x86_64.zip

  release:
    name: Create GitHub release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: uvie-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || false }}
          generate_release_notes: true
          files: dist/*
          body: |
            ## uvie ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

            Cross-platform executables and static libraries for the Vietnamese input engine.

            | Platform | Asset | Contents |
            | -------- | ----- | -------- |
            | macOS universal | `uvie-macos-universal.tar.gz` | `uvie`, `libuvie.a` (arm64 + x86_64), `uvie.h` |
            | Linux x86_64 | `uvie-linux-x86_64.tar.gz` | `uvie`, `libuvie.a`, `uvie.h` |
            | Windows x86_64 | `uvie-windows-x86_64.zip` | `uvie.exe`, `uvie.lib`, `uvie.h` |

            ### Swift Package Manager / macOS app
            See the [UVieKey frontend repo](https://github.com/thuupx/UVieKey) for an example.

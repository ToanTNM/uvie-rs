name: Release uvie library

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create as draft release'
        type: boolean
        default: true

jobs:
  release:
    name: Build & release macOS static library
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Install Rust toolchain ─────────────────────────────────────────
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      # ── 3. Build universal static library ───────────────────────────────────
      - name: Build Rust lib (arm64)
        run: cargo build --release --target aarch64-apple-darwin

      - name: Build Rust lib (x86_64)
        run: cargo build --release --target x86_64-apple-darwin

      - name: Lipo Rust lib → universal
        run: |
          mkdir -p dist/uvie
          lipo -create \
            target/aarch64-apple-darwin/release/libuvie.a \
            target/x86_64-apple-darwin/release/libuvie.a \
            -output dist/uvie/libuvie.a

      # ── 4. Include generated C header ─────────────────────────────────────
      - name: Copy C header
        run: cp include/uvie.h dist/uvie/uvie.h

      # ── 5. Package release artifact ───────────────────────────────────────
      - name: Create tarball
        run: |
          cd dist
          tar czf uvie-macos-universal.tar.gz uvie

      # ── 6. Draft release ──────────────────────────────────────────────────
      - name: Create Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: ${{ github.event_name == 'workflow_dispatch' && inputs.draft || true }}
          generate_release_notes: true
          files: dist/uvie-macos-universal.tar.gz
          body: |
            ## uvie ${{ github.ref_name }}

            ### macOS universal static library
            Download `uvie-macos-universal.tar.gz` to embed the Rust engine in a Swift/Objective-C project.

            Contents:
            - `uvie/libuvie.a` — universal (`arm64` + `x86_64`) static library
            - `uvie/uvie.h` — C FFI header

            ### Usage with Swift Package Manager
            See the [UVieKey frontend repo](https://github.com/thuupx/UVieKey) for an example.
